# .github/workflows/feishu-sync.yml
name: Feishu Bitable Sync

on:
  # 允许你手动在 GitHub 页面上点击运行
  workflow_dispatch:

  # 定时触发
  schedule:
    # Cron 表达式：分钟 小时 日 月 星期
    # 示例：每天北京时间上午 9:00 运行
    # GitHub Actions 使用的是 UTC 时间，北京时间是 UTC+8
    # 所以 01:00 UTC = 09:00 CST
    - cron: '0 1 * * *'

# 设置 GITHUB_TOKEN 的权限以允许部署到 GitHub Pages
permissions:
  contents: read
  pages: write
  id-token: write

# 允许一个并发部署
concurrency:
  group: "pages"
  cancel-in-progress: false

jobs:
  sync-data:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '24' # 使用最新的 LTS 版本

      - name: Install dependencies
        run: npm install node-fetch # 安装 fetch 依赖

      - name: Run Sync Script
        env:
          FS_APP_ID: ${{ secrets.FS_APP_ID }}
          FS_APP_SECRET: ${{ secrets.FS_APP_SECRET }}
          BITABLE_APP_TOKEN: ${{ secrets.BITABLE_APP_TOKEN }}
          PROJECT_TABLE_ID: ${{ secrets.PROJECT_TABLE_ID }}
          CAPABILITY_TABLE_ID: ${{ secrets.CAPABILITY_TABLE_ID }}
        run: node scripts/feishu_sync.js

      - name: Upload Pages artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: ./docs/dynamic

  deploy-pages:
    needs: sync-data
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4

      - name: Send Adaptive Card to Teams
        env:
          TEAMS_WEBHOOK_URL: ${{ secrets.TEAMS_WEBHOOK_URL }}
          PAGE_URL: ${{ steps.deployment.outputs.page_url }}/project-capability-graph.html
        run: |
          curl -X POST "${TEAMS_WEBHOOK_URL}" \
            -H "Content-Type: application/json" \
            -d '{
              "type": "AdaptiveCard",
              "$schema": "http://adaptivecards.io/schemas/adaptive-card.json",
              "version": "1.4",
              "body": [
                {
                  "type": "TextBlock",
                  "size": "Large",
                  "weight": "Bolder",
                  "text": "🚀 Project & Capability Knowledge"
                },
                {
                  "type": "TextBlock",
                  "text": "Check out the details of the project & capability knowledge graph!",
                  "wrap": true,
                  "spacing": "Medium"
                },
                {
                  "type": "FactSet",
                  "facts": [
                    {
                      "title": "Updated At:",
                      "value": "'"$(date -u +"%Y-%m-%d %H:%M:%S UTC")"'"
                    },
                    {
                      "title": "Status:",
                      "value": "✅ Success"
                    }
                  ],
                  "spacing": "Medium"
                }
              ],
              "actions": [
                {
                  "type": "Action.OpenUrl",
                  "title": "Click to view",
                  "url": "'"${PAGE_URL}"'"
                }
              ]
            }'
        shell: bash

